name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      run_smoke:
        description: 'Run Playwright E2E smoke tests'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Backend type check
        working-directory: backend
        run: python -m compileall app

      - name: Lint backend
        continue-on-error: true
        working-directory: backend
        run: ruff check app

      - name: Backend tests
        working-directory: backend
        run: pytest -c pytest.ini

  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Lint frontend
        continue-on-error: true
        working-directory: frontend
        run: pnpm run lint:check

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm run typecheck

      - name: Unit tests (frontend)
        working-directory: frontend
        env:
          CI: true
        run: pnpm test

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

  playwright:
    name: Playwright E2E (Ubuntu)
    runs-on: ubuntu-latest
    needs: frontend
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_smoke == 'true' || github.event.inputs.run_smoke == true) }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Set random port for Vite
        run: echo "VITE_PORT=$(( 49152 + RANDOM % 16384 ))" >> $GITHUB_ENV

      - name: Start Vite dev server
        working-directory: frontend
        env:
          VITE_PORT: ${{ env.VITE_PORT }}
        run: |
          pnpm exec vite --host 127.0.0.1 --port $VITE_PORT > /tmp/vite.log 2>&1 &
          echo "Waiting for Vite server to be ready..."
          sleep 10
          echo "Vite server should be running"

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: true
          PORT: ${{ env.VITE_PORT }}
          VITE_PORT: ${{ env.VITE_PORT }}
        run: pnpm run test:e2e
