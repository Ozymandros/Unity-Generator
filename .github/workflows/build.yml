name: Build and Release
on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: pnpm install --no-frozen-lockfile
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get pnpm store path
        id: pnpmstore
        shell: bash
        run: echo "storepath=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Debug pnpm store path
        run: echo "PNPM store path is ${{ steps.pnpmstore.outputs.storepath }}"
      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpmstore.outputs.storepath }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Build Package (Backend + Frontend)
        run: pnpm run package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Generator-Installer
          path: "**/*.msi"

      - name: Upload SK Integration Docs
        uses: actions/upload-artifact@v4
        with:
          name: SK-Integration-Docs
          path: docs/UNITY_MCP_SK_*
