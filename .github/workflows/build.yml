name: Build and Release

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Add universe repo and update (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository universe
          sudo apt-get update

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build backend sidecar
        run: pnpm -w run build:backend

      - name: Verify backend sidecar exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "backend/dist/unity-generator-backend.exe")) {
            throw "Missing backend/dist/unity-generator-backend.exe"
          }

      - name: Verify backend sidecar exists (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f backend/dist/unity-generator-backend || (echo "Missing backend/dist/unity-generator-backend" && exit 1)

      - name: Build Package
        run: pnpm -w run tauri:build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Generator-${{ runner.os }}
          path: frontend/src-tauri/target/release/bundle/**/*

      - name: Upload SK Integration Docs
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SK-Integration-Docs
          path: docs/UNITY_MCP_SK_*
